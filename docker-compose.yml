services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    env_file: ./.env
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: ${DB_CLIENT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ENABLED: ${DIRECTUS_CORS_ENABLED}
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:${PORT}/server/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${API_PORT}:${API_PORT}"
    env_file: ./.env
    environment:
      NODE_ENV: ${NODE_ENV}
      DIRECTUS_URL: ${DIRECTUS_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      directus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:${API_PORT}/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "9001:9001"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9001/"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  directus_uploads:
  directus_extensions:
